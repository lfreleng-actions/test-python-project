name: 'CodeQL'
# Must be called codeql.yml NOT codeql.yaml or GitHub will ignore it

on:
  workflow_dispatch:
  push:
    branches: ['main', 'master']
    paths:
      - '!.github/**'
      - '!.docs/**'
  schedule:
    - cron: '40 4 * * 0'

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions: {}

jobs:
  scan:
    name: 'Audit Repository'
    # yamllint disable-line rule:line-length
    uses: lfit/releng-reusable-workflows/.github/workflows/reuse-python-codeql.yaml@490195325b0f5b83e1de13df2dac6520d86ba1fb # v0.8.0
    permissions:
      security-events: write  # Upload CodeQL results to code scanning
      packages: read  # Fetch internal or private CodeQL packs
      # The permissions below are required in private repositories
      actions: read  # Read Actions run metadata (private repos)
      contents: read  # Checkout repository and read its contents
